<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    /* SunoGrid design system 配色(从 web/src/app/globals.css :root 同步,暖色暗色)。 */
    :root {
      color-scheme: dark;
      --bg-0:#1c1b19; --bg-1:#232220; --bg-2:#2a2825; --bg-3:#322f2b;
      --line:#39352f; --line-2:#48433b;
      --tx:#ece9e3; --tx-2:#a39d92; --tx-3:#6f6a60;
      --acc:#c2724f; --acc-dim:rgba(194,114,79,.13);
      --danger:#cf8a7a; --ok:#5dcaa5;
      --r:3px; --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    }
    * { box-sizing: border-box; }
    body { font: 12px/1.4 -apple-system,"SF Pro Text",system-ui,"Segoe UI",sans-serif; width: 320px; margin: 0; padding: 12px; color: var(--tx); background: var(--bg-0); -webkit-font-smoothing: antialiased; letter-spacing: .005em; }
    h1 { font-size: 13px; font-weight: 600; margin: 0 0 10px; display: flex; align-items: center; gap: 6px; }
    h1 .v { font-size: 10px; font-weight: 500; color: var(--tx-3); }
    .card { padding: 10px; background: var(--bg-1); border: 1px solid var(--line); border-radius: var(--r); margin-bottom: 10px; }
    .card:last-of-type { margin-bottom: 0; }
    .card-h { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--tx-3); margin-bottom: 9px; }
    button { font: inherit; font-size: 11px; color: var(--tx-2); background: var(--bg-0); border: 1px solid var(--line); border-radius: var(--r); padding: 4px 10px; cursor: pointer; }
    button:hover:not(:disabled) { color: var(--tx); border-color: var(--line-2); }
    button:disabled { opacity: .5; cursor: default; }
    .hint { font-size: 11px; color: var(--tx-3); margin: 9px 0 0; line-height: 1.55; }
    .hint b { color: var(--tx-2); font-weight: 600; }
    /* —— LED:跟 app 的 SunoStatus 灯同色(绿=就绪/暖红=有问题/灰闪=检测中)—— */
    .led { width: 9px; height: 9px; border-radius: 50%; flex: none; display: inline-block; background: var(--tx-3); }
    .led.ok { background: var(--ok); box-shadow: 0 0 5px rgba(93,202,165,.7); }
    .led.err { background: var(--danger); box-shadow: 0 0 5px rgba(207,138,122,.7); }
    .led.checking { background: var(--tx-3); animation: blink 1s ease-in-out infinite; }
    @keyframes blink { 50% { opacity: .3; } }
    /* —— suno.com 状态卡 —— */
    .su-row { display: flex; align-items: flex-start; gap: 8px; }
    .su-row .led { margin-top: 3px; }
    .su-txt { flex: 1; min-width: 0; }
    #su-title { color: var(--tx); font-weight: 600; }
    .su-detail { font-size: 11px; color: var(--tx-2); margin-top: 2px; line-height: 1.5; }
    .su-actions { display: flex; gap: 6px; margin-top: 10px; }
    /* —— App sites bridge —— */
    .bx-cur { display: flex; align-items: center; gap: 8px; min-height: 22px; }
    .bx-org { flex: 1; font-family: var(--mono); font-size: 11px; word-break: break-all; color: var(--tx-2); }
    .bx-state { font-size: 11px; color: var(--acc); font-weight: 600; }
    .bx-builtin { font-size: 11px; color: var(--tx-3); }
    #bx-list { margin-top: 4px; }
    .bx-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid var(--line); }
    .bx-item .o { flex: 1; font-family: var(--mono); font-size: 11px; word-break: break-all; color: var(--tx-2); }
  </style>
</head>
<body>
  <h1>Suno Bridge <span class="v" id="ver"></span></h1>

  <!-- suno.com 连接/登录状态:绿=已登录可生成、红=没标签/没登录/标签未就绪、灰闪=检测中 -->
  <div class="card" id="suno">
    <div class="card-h">suno.com connection</div>
    <div class="su-row">
      <span id="su-led" class="led checking"></span>
      <div class="su-txt">
        <div id="su-title">Checking…</div>
        <div id="su-detail" class="su-detail">Talking to your suno.com tab…</div>
      </div>
    </div>
    <div class="su-actions">
      <button id="su-open" style="display:none">Open suno.com</button>
      <button id="su-recheck">Re-check</button>
    </div>
  </div>

  <!-- app 站点桥接:sunogrid.com / localhost 内建;其它自托管域名点 Connect 授权 -->
  <div class="card" id="bridge">
    <div class="card-h">App sites</div>
    <div id="bx-cur" class="bx-cur"></div>
    <div id="bx-list"></div>
    <p class="hint">Built in: <b>sunogrid.com</b> &amp; <b>localhost</b> (no setup). Self-hosting on another domain? Open your site, then click <b>Connect</b> — no manifest editing needed.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
